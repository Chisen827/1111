<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>平民法律指南</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI";margin:0;background:#f4f7fb;}
header{background:#1f4f8b;color:white;text-align:center;padding:25px;}
.container{max-width:1000px;margin:auto;padding:20px;}
.scenario-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:20px;margin-top:20px;}
.card{background:white;padding:20px;border-radius:10px;cursor:pointer;box-shadow:0 2px 6px rgba(0,0,0,.05);text-align:center;font-weight:600;}
.section{background:white;padding:20px;margin-top:20px;border-radius:10px;box-shadow:0 2px 6px rgba(0,0,0,.05);}
.keyword{display:inline-block;background:#eef3ff;padding:6px 10px;margin:4px;border-radius:6px;}
.evidence-row{display:flex;justify-content:space-between;align-items:center;margin-top:10px;}
button{background:#1f4f8b;color:white;border:none;padding:10px 16px;border-radius:6px;cursor:pointer;}
.link{display:block;margin:6px 0;}
input[type="text"]{padding:6px 10px;border-radius:6px;border:1px solid #ccc;margin-left:10px;}
</style>
</head>
<body>

<header>
<h1>平民法律指南</h1>
<p>法律信息检索与维权流程指引（仅供参考）</p>
</header>

<div class="container">

<!-- 首页 -->
<div id="homePage">
<h2>选择你的法律场景</h2>
<div class="scenario-grid">
<div class="card" onclick="openScenario('拖欠工资')">拖欠工资</div>
<div class="card" onclick="openScenario('违法裁员')">违法裁员</div>
<div class="card" onclick="openScenario('加班费纠纷')">加班费纠纷</div>
<div class="card" onclick="openScenario('租房押金')">租房押金不退</div>
<div class="card" onclick="openScenario('借钱不还')">借钱不还</div>
<div class="card" onclick="openScenario('消费纠纷')">消费纠纷</div>
</div>
</div>

<!-- 结果页 -->
<div id="resultPage" style="display:none">
<button onclick="goHome()">← 返回首页</button>

<div class="section">
<h3>案件类型</h3>
<div id="keywords"></div>
</div>

<div class="section">
<h3>真实案例检索</h3>
<div id="caseLinks"></div>
</div>

<div class="section">
<h3>维权步骤建议</h3>
<div id="steps"></div>
</div>

<div class="section">
<h3>证据清单与上传</h3>
<label>ZIP 文件名：
<input type="text" id="zipNameInput" placeholder="输入文件名，例如：证据材料">
</label>
<div id="evidenceList"></div>
<br>
<button onclick="downloadZip()">一键打包证据ZIP</button>
</div>

</div>

</div>

<script>
const STEP_DB={
"拖欠工资":["保存劳动合同","收集工资支付记录","向劳动监察投诉","申请劳动仲裁"],
"违法裁员":["确认裁员是否合法","收集解除合同证据","申请劳动仲裁"],
"加班费纠纷":["收集加班记录","保存工资流水","申请劳动仲裁"],
"租房押金":["保存租房合同","保留付款记录","向住房管理部门投诉"],
"借钱不还":["保存借条","保留转账记录","协商或起诉"],
"消费纠纷":["保留购物凭证","联系客服记录","向消费者协会投诉"]
}

const EVIDENCE_DB={
"拖欠工资":["劳动合同","工资转账记录","考勤记录","聊天记录"],
"违法裁员":["劳动合同","解除通知","工资记录"],
"借钱不还":["借条","转账记录","聊天记录"]
}

let currentScenario=""
let uploadedFiles={}

function openScenario(type){
currentScenario=type
document.getElementById("homePage").style.display="none"
document.getElementById("resultPage").style.display="block"
renderScenario(type)
}

function renderScenario(type){
document.getElementById("keywords").innerHTML=`<span class="keyword">${type}</span>`
renderCaseLinks(type)
renderSteps(type)
renderEvidence(type)
}

function renderCaseLinks(type){
let q=encodeURIComponent(type)
let html=`
<a class="link" target="_blank" href="https://www.bing.com/search?q=${q}+判例">Bing 判例搜索</a>
<a class="link" target="_blank" href="https://www.google.com/search?q=${q}+案例+判决">Google 案例搜索</a>
<a class="link" target="_blank" href="https://openlaw.cn/search?q=${q}">OpenLaw 案例库</a>
<a class="link" target="_blank" href="https://wenshu.court.gov.cn">中国裁判文书网入口</a>
`
document.getElementById("caseLinks").innerHTML=html
}

function renderSteps(type){
let html=""
STEP_DB[type].forEach(s=>{html+=`<div>${s}</div>`})
document.getElementById("steps").innerHTML=html
}

function renderEvidence(type){
let list=EVIDENCE_DB[type]||["证据材料"]
let html=""
list.forEach(item=>{
html+=`
<div class="evidence-row">
<span>${item}</span>
<input type="file" onchange="saveFile('${item}',this.files[0])">
</div>
`
})
document.getElementById("evidenceList").innerHTML=html
}

function saveFile(name,file){uploadedFiles[name]=file}

async function downloadZip(){
let zip=new JSZip()
for(let key in uploadedFiles){zip.file(uploadedFiles[key].name,uploadedFiles[key])}
let zipName=document.getElementById("zipNameInput").value.trim()
if(!zipName) zipName="证据材料"
let blob=await zip.generateAsync({type:"blob"})
let a=document.createElement("a")
a.href=URL.createObjectURL(blob)
a.download=zipName+".zip"
a.click()
}

function goHome(){
document.getElementById("resultPage").style.display="none"
document.getElementById("homePage").style.display="block"
}
</script>

</body>
</html>
